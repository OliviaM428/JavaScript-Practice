<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template 1</title>
</head>

<body>
    <div class="cards" id="book-card">
        <!-- Do not hardcode the content here, use JavaScript -->
    </div>
    <script>
        const book = {
            "id": 42,
            "title": "The Hitchhiker's Guide to the Galaxy",
            "author": "Douglas Adams",
            "year": 1979,
            "genres": ["Science Fiction", "Comedy", "Adventure"],
            "pages": 224,
            "language": "English",
            "imageUrl": "https://images-na.ssl-images-amazon.com/images/I/81XSN3hA5gL.jpg"
        }


        function createBookCard(book) {
            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <img src="${book.imageUrl}" alt="${book.title}">
                <div class="card-title">${book.title}</div>
                <div class="card-content">
                <p>Author: ${book.author}</p>
                <p>Year: ${book.year}</p>
                <p>Genres: ${book.genres.join(", ")}</p>
                <p>Pages: ${book.pages}</p>
                <p>Language: ${book.language}</p>
            </div>
            `;

            return card;
        }

        document.getElementById("book-card").appendChild(createBookCard(book));




    </script>

    <style>
        /* Your CSS here
           Requirements:
           - Card width of 300px with a border
           - Text color #333
           - Title 1.5 times as big as base font
           - Headings should be uppercase
           - Use flexbox for layout
        */
        .card {
            width: 300px;
            border: 1px solid #111111;
            color: #333;
            display: flex;
            flex-direction: column;
            padding: 5px;
        }

        .card-title{
            font-size: 1.5em;
            font-style: Uppercase;
            font-weight: bold;
        }
        .card img{
            width: 100%;
            height: auto;
            border-radius: 10px;  /*Smooth corners of image */ 
        }
    </style>
</body>

</html>
