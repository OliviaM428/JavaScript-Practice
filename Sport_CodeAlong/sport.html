<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Tracker Website Demo</title>
</head>
<body>
    <h1>Hawks Season Results</h1>
    <table id ="season-results-table">
        <caption>Game results for the Hawks</caption>

        </thead>
        
    </table>
    <script src = "main.js" defer></script>
</body>
</html>
